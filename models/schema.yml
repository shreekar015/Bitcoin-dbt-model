version: 2

models:
    
  - name: stg_btc
    columns:
      - name: HASH_KEY
        data_tests:
          - unique
          - not_null

  - name: whales_alert
    latest_version: 2

    columns:
      - name: HASH_KEY
        data_tests:
          - unique
          - not_null

      - name: output_address
        data_tests:
          - assert_valid_btc_address

    versions:
      - v: 1
        deprecation_date: 2027-01-01

      - v: 2
        columns:
          - include: all
            exclude:
              - total_sent_usd